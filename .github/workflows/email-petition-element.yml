# Builds the email petition web component and deploys the bundled dist file to
# the /email-petition/ path of the shared S3 bucket, then invalidates
# that path in CloudFront.

name: Deploy email-petition-element to S3

on:
  push:
    branches:
      - main
    paths:
      - packages/email-petition-element/**
      - packages/email-petition/**
      - packages/components/**
  workflow_dispatch:

# Ensure only one deployment per branch runs at a time so an older run can't
# finish after a newer one and overwrite the current artifacts.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy email-petition-element
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false
      - name: build
        run: |
          node --version
          pnpm install --frozen-lockfile
          pnpm build --filter="@dxe/email-petition-element"
      - name: sync to S3
        run: |
          aws s3 sync packages/email-petition-element/dist \
            "s3://${AWS_S3_BUCKET}/email-petition" \
            --acl public-read \
            --delete
        env:
          AWS_S3_BUCKET: ${{ vars.DXE_STATIC_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "us-west-1"
      - uses: chetan/invalidate-cloudfront-action@6adb1f613f4102ad81cd08a7ba83b8abe490cb8d # v2.4.2
        env:
          DISTRIBUTION: ${{ vars.DXE_STATIC_CLOUDFRONT_DISTRIBUTION }}
          PATHS: >-
            /email-petition/*
          AWS_REGION: "us-west-2"
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
