# Builds and deploys the email-petition web component, the email-petition-element
# bundle (embedded by third-party sites), and the frontend apps.
#
# A `changes` job maps changed files to the work that depends on them, so each
# job only runs when something it actually consumes changed:
#   - the @dxe/email-petition gate (tests, lint, format) runs for that package
#     and the shared components it builds on
#   - the email-petition-element check runs only for its own sources,
#     since nothing in this repo consumes it
#   - each frontend app deploys for its own sources plus the email-petition
#     stack it bundles
#
# PRs only run checks; they don't trigger deploys or get access to deploy secrets.

name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - apps/freezoe.org/**
      - apps/helpthechickens.com/**
      - apps/helptheducks.com/**
      - packages/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Ensure only one run per branch is in flight so an older run can't finish after
# a newer one and overwrite the current artifacts.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Test, lint, and format gate for @dxe/email-petition, shared by every deploy
  # that bundles it. Runs when the package or the shared components it depends on
  # change (or on manual dispatch, which has no diff to filter on).
  test:
    name: Test, lint & format email-petition
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.petition == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false
      - name: install
        run: pnpm install --frozen-lockfile
      - name: lint
        run: pnpm lint --filter="@dxe/email-petition"
      - name: check format
        run: pnpm exec prettier --check packages/email-petition
      - name: test
        run: pnpm test --filter="@dxe/email-petition"

  # Checks for the standalone web-component build. It bundles the email-petition
  # stack, so its checks run when that stack changes too (see the `element`
  # filter).
  # TODO: this currently only checks formatting; add lint and tests for
  # email-petition-element so those dependency paths actually exercise its code.
  check-email-petition-element:
    name: Check email-petition-element
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.element == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false
      - name: install
        run: pnpm install --frozen-lockfile
      - name: check format
        run: pnpm exec prettier --check packages/email-petition-element

  # Maps changed files to the deploys that depend on them. Apps and the element
  # bundle embed @dxe/email-petition, which in turn builds on the shared
  # components, so both packages count as inputs to everything downstream.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      petition: ${{ steps.filter.outputs.petition }}
      element: ${{ steps.filter.outputs.element }}
      freezoe: ${{ steps.filter.outputs.freezoe }}
      chickens: ${{ steps.filter.outputs.chickens }}
      ducks: ${{ steps.filter.outputs.ducks }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            petition:
              - packages/email-petition/**
              - packages/components/**
            element:
              - packages/email-petition-element/**
              - packages/email-petition/**
              - packages/components/**
            freezoe:
              - apps/freezoe.org/**
              - packages/email-petition/**
              - packages/components/**
            chickens:
              - apps/helpthechickens.com/**
              - packages/email-petition/**
              - packages/components/**
            ducks:
              - apps/helptheducks.com/**
              - packages/email-petition/**
              - packages/components/**

  # Rebuilds and publishes the third-party bundle when its own sources change or
  # when the email-petition stack it embeds does.
  #
  # `!cancelled()` lets the job evaluate when its gates were skipped (e.g. only the
  # element's own sources changed, so the email-petition `test` gate didn't run);
  # GitHub only drops the implicit `success()` gate when the `if` calls a status
  # check function.
  deploy-email-petition-element:
    name: Deploy email-petition-element
    needs: [test, changes, check-email-petition-element]
    if: >-
      !cancelled() &&
      github.event_name != 'pull_request' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.check-email-petition-element.result == 'success' || needs.check-email-petition-element.result == 'skipped') &&
      (needs.changes.outputs.element == 'true' || needs.changes.outputs.petition == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false
      - name: install
        run: |
          node --version
          pnpm install --frozen-lockfile
      # Checks are gated by the `check-email-petition-element` job (see `needs`).
      - name: build
        run: pnpm build --filter="@dxe/email-petition-element"
      - name: sync to S3
        # cache-control: The bundle filename is stable (not content-hashed), so
        # third-party sites embedding it will keep serving a cached copy unless we
        # set an explicit, short Cache-Control. 5 minutes balances letting third
        # parties pick up published updates promptly against request volume.
        run: |
          aws s3 sync packages/email-petition-element/dist \
            "s3://${AWS_S3_BUCKET}/email-petition" \
            --acl public-read \
            --delete \
            --cache-control "public, max-age=300"
        env:
          AWS_S3_BUCKET: ${{ vars.DXE_STATIC_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "us-west-1"
      - uses: chetan/invalidate-cloudfront-action@6adb1f613f4102ad81cd08a7ba83b8abe490cb8d # v2.4.2
        env:
          DISTRIBUTION: ${{ vars.DXE_STATIC_CLOUDFRONT_DISTRIBUTION }}
          PATHS: >-
            /email-petition/*
          AWS_REGION: "us-west-2"
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # Deploy apps when the email-petition `test` gate passed or was skipped (the
  # petition stack was unchanged), but not when it failed or was cancelled.
  #
  # `!cancelled()` is required so the job still evaluates when `test` is skipped.
  # GitHub only skips the implicit `success()` gate when the `if` contains a status
  # check function.
  # https://docs.github.com/en/actions/reference/workflows-and-actions/expressions#status-check-functions

  deploy-freezoe:
    needs: [test, changes]
    if: >-
      !cancelled() &&
      github.event_name != 'pull_request' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.changes.outputs.freezoe == 'true' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
    uses: ./.github/workflows/frontend.yml
    with:
      package-name: freezoe.org
      package-path: apps/freezoe.org
      aws-s3-bucket: ${{ vars.FREE_ZOE_S3_BUCKET }}
      aws-cloudfront-distribution: ${{ vars.FREE_ZOE_CLOUDFRONT_DISTRIBUTION }}
    secrets:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  deploy-chickens:
    needs: [test, changes]
    if: >-
      !cancelled() &&
      github.event_name != 'pull_request' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.changes.outputs.chickens == 'true' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
    uses: ./.github/workflows/frontend.yml
    with:
      package-name: helpthechickens.com
      package-path: apps/helpthechickens.com
      aws-s3-bucket: ${{ vars.HELP_THE_CHICKENS_S3_BUCKET }}
      aws-cloudfront-distribution: ${{ vars.HELP_THE_CHICKENS_CLOUDFRONT_DISTRIBUTION }}
    secrets:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  deploy-ducks:
    needs: [test, changes]
    if: >-
      !cancelled() &&
      github.event_name != 'pull_request' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.changes.outputs.ducks == 'true' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
    uses: ./.github/workflows/frontend.yml
    with:
      package-name: helptheducks.com
      package-path: apps/helptheducks.com
      aws-s3-bucket: ${{ vars.HELP_THE_DUCKS_S3_BUCKET }}
      aws-cloudfront-distribution: ${{ vars.HELP_THE_DUCKS_CLOUDFRONT_DISTRIBUTION }}
    secrets:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
